- defaults:
    link:
      create: true
      relink: true

# git
- link:
    ~/.gitconfig: git/gitconfig

# shell
- link:
    ~/.zshrc:
      path: shell/zsh/.zshrc
      force: true
    ~/.bash_profile: shell/zsh/.bash_profile
    ~/.config/zsh/aliases.zsh: shell/zsh/aliases.zsh
    ~/.config/zsh/custom.zsh: shell/zsh/custom.zsh
    ~/.config/zsh/completions.zsh: shell/zsh/completions.zsh
    ~/.config/zsh/nvm.zsh: shell/zsh/nvm.zsh
    ~/.config/zsh/private.zsh: shell/zsh/private.zsh

# kitty
- link:
    ~/.config/kitty/kitty.conf: shell/kitty/kitty.conf
    ~/.config/kitty/current-theme.conf: shell/kitty/current-theme.conf

# starship
- link:
    ~/.config/starship.toml: starship/starship.toml

# fastfetch
- link:
    ~/.config/fastfetch/config.jsonc: shell/fastfetch/config.jsonc

- clean: ['~']

- shell:
    - sh linux/gsettings.sh